[project]
copyright = "Copyright &copy; 2026 Eran Rivlis"
site_name = "AlgebraX"
site_author = "Eran Rivlis"
site_description = ""
repo_url = "https://github.com/erivlis/algebrax"
repo_name = "erivlis/algebrax"
#license = "https://github.com/erivlis/algebrax/LICENSE"
extra_css = [
    "stylesheets/extra.css"
]
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]
nav = [
    { Start = [
        "index.md",
        "concepts.md"
    ] },
    { Guide = [
        { Semirings = [
            "guide/semirings/semiring_standard.md",
            "guide/semirings/semiring_tropical.md",
            "guide/semirings/semiring_provenance.md",
            "guide/semirings/semiring_digital.md",
            "guide/semirings/semiring_convex_hull.md",
            "guide/semirings/semiring_matrix.md",
            "guide/semirings/semiring_boolean.md",
            "guide/semirings/semiring_viterbi.md",
        ] },
        { NLP = ["guide/nlp/cyk_parsing.md"] },
        { Trie = ["guide/trie/algebraic_trie.md"] },
        { Physics = [
            "guide/physics/pagerank.md",
            "guide/physics/graph_reynolds.md",
            "guide/physics/fenchel_legendre.md"
        ] },
        { Combinatorics = ["guide/combinatorics/catalan.md"] },
        { Performance = ["guide/performance/benchmark_matrix_mult.md"] }
    ] }
]


[project.theme]
variant = "classic"
font.text = "Inter"
font.code = "JetBrains Mono"
language = "en"
logo = "images/logo.png"
favicon = "images/logo.png"
features = [
    "content.code.copy",
    "content.code.select",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.sections",
    #    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "toc.follow",
]


